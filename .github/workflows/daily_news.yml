name: Daily AI News Report

on:
  schedule:
    # 7:00 AM UTC = 9:00 AM Cairo time (UTC+2)
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-news:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify environment
        run: |
          python -c "import os; missing = [k for k in ['BOT_TOKEN', 'CHAT_ID', 'GEMINI_API_KEY'] if not os.environ.get(k)]; exit(1 if missing else 0)"

      - name: Run AI News Bot
        run: python main.py

      - name: Report result
        if: always()
        run: echo 'Bot execution completed'
